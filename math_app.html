// PWA SETUP (manifest + service worker + install prompt)
// ============================================================
(function() {
  // 1. manifest.json を動的に生成してリンク
  const manifest = {
    name: PWA_APP_NAME,
    short_name: PWA_APP_SHORT_NAME,
    description: PWA_APP_DESC,
    start_url: "./",
    display: "standalone",
    background_color: PWA_BG_COLOR,
    theme_color: PWA_THEME_COLOR,
    orientation: "portrait",
    icons: [
      { src: "data:image/png;base64," + PWA_ICON_192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: "data:image/png;base64," + PWA_ICON_512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestURL = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestURL;
  document.head.appendChild(link);

  // 2. iOS用のホーム画面アイコン・メタタグ
  const appleIcon = document.createElement('link');
  appleIcon.rel = 'apple-touch-icon';
  appleIcon.href = "data:image/png;base64," + PWA_ICON_192;
  document.head.appendChild(appleIcon);

  const metaCapable = document.createElement('meta');
  metaCapable.name = 'apple-mobile-web-app-capable';
  metaCapable.content = 'yes';
  document.head.appendChild(metaCapable);

  const metaStatusBar = document.createElement('meta');
  metaStatusBar.name = 'apple-mobile-web-app-status-bar-style';
  metaStatusBar.content = 'black-translucent';
  document.head.appendChild(metaStatusBar);

  const metaTitle = document.createElement('meta');
  metaTitle.name = 'apple-mobile-web-app-title';
  metaTitle.content = PWA_APP_SHORT_NAME;
  document.head.appendChild(metaTitle);

  const metaTheme = document.createElement('meta');
  metaTheme.name = 'theme-color';
  metaTheme.content = PWA_THEME_COLOR;
  document.head.appendChild(metaTheme);

  // 3. ホーム画面に追加していない場合に案内を表示（iOS Safari向け）
  function isInStandaloneMode() {
    return ('standalone' in window.navigator) && (window.navigator.standalone);
  }
  function isIOS() {
    return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
  }

  function showInstallHint() {
    if (isInStandaloneMode()) return; // すでにホーム画面から起動している
    if (localStorage.getItem('pwa_install_hint_dismissed')) return;
    if (!isIOS()) return; // 今回はiOS Safari向けの案内のみ実装

    const hint = document.createElement('div');
    hint.id = 'pwa-install-hint';
    hint.style = `
      position: fixed; left: 16px; right: 16px; bottom: 56px;
      background: white; border: 2px solid ${PWA_THEME_COLOR};
      border-radius: 16px; padding: 14px 16px; z-index: 10000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      font-family: 'Zen Maru Gothic', sans-serif;
      display: flex; align-items: center; gap: 10px;
    `;
    hint.innerHTML = `
      <div style="flex:1; font-size:12px; line-height:1.6; color:#1c1c1a;">
        <strong>📲 ホーム画面に追加</strong>すると、アプリのように使えます。<br>
        下の<strong>共有ボタン</strong>（□と↑）→「ホーム画面に追加」をタップ。
      </div>
      <button id="pwa-hint-close" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af;flex-shrink:0;">✕</button>
    `;
    document.body.appendChild(hint);
    document.getElementById('pwa-hint-close').onclick = function() {
      hint.remove();
      localStorage.setItem('pwa_install_hint_dismissed', 'true');
    };
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(showInstallHint, 2000);
  });
})();

<style>:root {
  --white: #ffffff;
  --off-white: #f8f8f6;
  --ink: #3f3f46;
  --gray: #6b6b68;
  --light-gray: #e8e8e4;

  --grade1-accent: #fb923c;
  --grade1-bg: #fff7ed;
  --grade2-accent: #f97316;
  --grade2-bg: #fff7ed;
  --grade3-accent: #ea580c;
  --grade3-bg: #fff7ed;

  --coral: #ff5e5b;
  --mint: #00c9a7;
  --yellow: #ffe135;
  --sky: #5bc8f5;
  --lavender: #a78bfa;

  --cur-accent: var(--grade1-accent);
  --cur-bg: var(--grade1-bg);

  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 3px 3px 0 var(--ink);
  --shadow-sm: 2px 2px 0 var(--ink);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--off-white);
  color: var(--ink);
  min-height: 100vh;
}
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.app-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: #1c1c1a;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--cur-accent);
}
.back-btn {
  background: none; border: 2px solid rgba(255,255,255,0.6); color: #ffffff;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; padding: 5px 12px; cursor: pointer;
  border-radius: 100px; transition: all 0.15s; flex-shrink: 0;
}
.back-btn:hover { border-color: #fde68a; color: #fde68a; }
.header-title {
  font-family: 'Noto Sans JP', sans-serif; font-size: 19px; font-weight: 700;
  color: #ffffff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-badge {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 100px; background: #fde68a; color: #1c1c1a; flex-shrink: 0;
}

/* HOME */
#screen-home {
  background: linear-gradient(160deg, #fff7ed 0%, #ffedd5 100%);
  padding: 28px 16px 40px; align-items: center;
}
.home-logo { text-align: center; max-width: 520px; width: 100%; margin-bottom: 28px; }
.home-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.home-series {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.4em; color: #ea580c; text-transform: uppercase; margin-bottom: 10px;
}
.home-title {
  font-size: clamp(34px,8vw,58px); font-weight: 900; color: #1c1c1a; line-height: 1.25; margin-bottom: 8px;
}
.home-title span { color: #ea580c; }
.home-sub { font-size: 16px; color: #1c1c1a; font-weight: 700; background:#fde68a; display:inline-block; padding:4px 14px; border-radius:100px; margin-top:6px; }

.grade-section-label {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3em; color: #1c1c1a; background:white; padding:4px 12px; border-radius:100px;
  max-width: 520px; width: 100%; margin-bottom: 10px; text-align:center;
}
.grade-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 520px; width: 100%; }
.grade-card {
  border: 2.5px solid #ea580c; border-radius: var(--radius); padding: 18px 18px;
  cursor: pointer; position: relative; overflow: hidden; transition: all 0.15s;
  background: white; display:flex; align-items:center; gap:14px; box-shadow: var(--shadow-sm);
}
.grade-card:hover { border-color: #ea580c; transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.grade-card.selected { border-color: var(--yellow) !important; box-shadow: 0 0 0 1px var(--yellow); }
.grade-card.locked { opacity: 0.5; cursor: not-allowed; }
.grade-icon { font-size: 32px; flex-shrink:0; }
.grade-info { flex:1; }
.grade-name { font-size: 18px; font-weight: 900; color: #1c1c1a; line-height: 1.2; margin-bottom: 2px; }
.grade-sub { font-size: 12px; color: var(--gray); line-height: 1.4; }
.grade-lock-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  background: #f3f4f6; color: #9ca3af; padding: 3px 8px; border-radius: 100px;
}

.start-btn-wrap { max-width: 520px; width: 100%; margin-top: 14px; }
.start-btn {

<script>
const APP_ID = 'math';
// ============================================================
// TRIAL & UNLOCK SYSTEM (7-day free trial → paid unlock)
// APP_ID は各アプリのHTMLで個別に定義される（例: 'math', 'kokugo'）
// ============================================================
const TRIAL_DAYS = 7;
const UNLOCK_STORAGE_KEY = 'app_unlocked_' + (typeof APP_ID !== 'undefined' ? APP_ID : 'default');
const BUNDLE_UNLOCK_KEY = 'bundle_unlocked_v1';
const TRIAL_START_KEY = 'app_trial_start_' + (typeof APP_ID !== 'undefined' ? APP_ID : 'default');

function initTrialSystem() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('unlock') === 'yes') {
    // この教科だけを解放
    localStorage.setItem(UNLOCK_STORAGE_KEY, 'true');
  }
  if (params.get('unlock') === 'bundle') {
    // 全教科セット購入 → 全アプリ共通のキーを解放
    // (同一オリジンなので、どのアプリで実行しても全アプリに反映される)
    localStorage.setItem(BUNDLE_UNLOCK_KEY, 'true');
  }
  if (!localStorage.getItem(TRIAL_START_KEY)) {
    localStorage.setItem(TRIAL_START_KEY, Date.now().toString());
  }
}

function isUnlocked() {
  return localStorage.getItem(UNLOCK_STORAGE_KEY) === 'true'
      || localStorage.getItem(BUNDLE_UNLOCK_KEY) === 'true';
}

function getTrialDaysLeft() {
  const start = parseInt(localStorage.getItem(TRIAL_START_KEY) || Date.now().toString());
  const elapsed = Date.now() - start;
  const daysElapsed = elapsed / (1000 * 60 * 60 * 24);
  return Math.max(0, Math.ceil(TRIAL_DAYS - daysElapsed));
}

function isTrialActive() {
  return getTrialDaysLeft() > 0;
}

function isContentAccessible() {
  return isUnlocked() || isTrialActive();
}

function showUnlockOverlay(purchaseUrl) {
  const overlay = document.createElement('div');
  overlay.id = 'unlock-overlay';
  overlay.style = `
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 24px;
  `;
  overlay.innerHTML = `
    <div style="background:white; border-radius:20px; padding:36px 28px; max-width:380px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div style="font-size:48px; margin-bottom:12px;">🔒</div>
      <div style="font-family:'Noto Sans JP',sans-serif; font-size:20px; font-weight:900; color:#1c1c1a; margin-bottom:8px;">
        無料期間が終了しました
      </div>
      <div style="font-size:13px; color:#6b7280; line-height:1.7; margin-bottom:24px;">
        7日間の無料体験は終了しました。<br>続けて使うには購入が必要です。
      </div>
      <a href="${purchaseUrl}" style="display:block; background:#7c3aed; color:white; text-decoration:none; font-family:'Noto Sans JP',sans-serif; font-weight:900; font-size:15px; padding:14px; border-radius:100px; box-shadow:0 4px 16px rgba(124,58,237,0.35); margin-bottom:10px;">
        🛒 このアプリだけ購入する
      </a>
      <a href="https://buy.stripe.com/fZu7sE1oQdzu41S1DU5wI01" style="display:block; background:#fde68a; color:#1c1c1a; text-decoration:none; font-family:'Noto Sans JP',sans-serif; font-weight:900; font-size:14px; padding:13px; border-radius:100px;">
        ✨ 全教科セットで購入する
      </a>
    </div>
  `;
  document.body.appendChild(overlay);
}

function showTrialBanner() {
  const daysLeft = getTrialDaysLeft();
  if (isUnlocked()) return;
  const accentColor = (typeof PWA_THEME_COLOR !== 'undefined') ? PWA_THEME_COLOR : '#7c3aed';
  const banner = document.createElement('div');
  banner.id = 'trial-banner';
  banner.style = `
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; color: ${accentColor}; text-align: center;
    padding: 10px 16px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; font-weight: 700; z-index: 9998;
    border-top: 3px solid ${accentColor};
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  `;
  banner.textContent = daysLeft > 0
    ? `🎁 無料体験 残り${daysLeft}日`
    : `🔒 無料体験が終了しました`;
  document.body.appendChild(banner);
  document.body.style.paddingBottom = '50px';
}

const PURCHASE_URL = 'https://buy.stripe.com/fZudR20kMfHC6a06Ye5wI06';
</script>

<script>function highlightDialogueTerms(text, vocabList) {
  if (!vocabList || vocabList.length === 0) return text;
  let result = text;
  const terms = vocabList.map(v => v[0]).filter(t => t && t.length >= 1);
  // 長い語句を先にマッチさせる（部分一致の衝突防止）
  const sorted = terms.slice().sort((a,b) => b.length - a.length);
  sorted.forEach(term => {
    // カッコ内の注記（例：「れる（recall）」）を除去して素の語句に
    const cleanTerm = term.split('（')[0].split('(')[0].trim();
    if (!cleanTerm) return;
    try {
      const escaped = cleanTerm.replace(/[.*+?^${}()|\[\]\\]/g, '\\$&');
      const regex = new RegExp('(' + escaped + ')', 'g');
      result = result.replace(regex, '<span class="dialogue-hl">$1</span>');
    } catch(e) {}
  });
  return result;
}

function wrapParens(text) {
  // （）や()の中身を改行禁止にして、入らなければ括弧ごと次の行に送る
  return text.replace(/([（(][^）)]*[）)])/g, '<span style="white-space:nowrap">$1</span>');
}

function formatPattern(text) {
  // 「/」区切りを改行に変換し、括弧の中身も改行禁止にする
  return wrapParens(text.split(/\s*\/\s*/).join('<br>'));
}

// STATE
// ============================================================
let currentGradeId = 'g1';
let currentGrade = GRADES.find(g => g.id === 'g1');
let currentEpIdx = 0;
let readMap = JSON.parse(localStorage.getItem('mathReadMap') || '{}');
let quizMap = JSON.parse(localStorage.getItem('mathQuizMap') || '{}');
let currentQuiz = [];
let currentQuizIdx = 0;
let quizScore = 0;
let lastQuizGradeId = '';
let lastQuizEpIdx = 0;

// ============================================================
// INIT HOME
// ============================================================
function applyGradeTheme(grade) {
  const r = document.documentElement.style;
  r.setProperty('--cur-accent', `var(--${grade.cls}-accent)`);
  r.setProperty('--cur-bg', `var(--${grade.cls}-bg)`);
}

function initGradeGrid() {
  const grid = document.getElementById('grade-grid');
  grid.innerHTML = GRADES.map(grade => {
    const readCount = (readMap[grade.id] || []).length;
    const total = grade.episodes.length;
    const locked = grade.locked;
    return `<div class="grade-card ${locked?'locked':''} ${grade.id===currentGradeId?'selected':''}" onclick="${locked?'':`selectGradeAndGo('${grade.id}')`}">
      <span class="grade-icon">${grade.icon}</span>
      <div class="grade-info">
        <div class="grade-name">${grade.name}</div>
        <div class="grade-sub">${grade.sub}${readCount>0?` ／ 📖 ${readCount}/${total}単元`:''}</div>
      </div>
      ${locked?'<div class="grade-lock-badge">準備中</div>':''}
    </div>`;
  }).join('');
}

function selectGrade(id) {
  currentGradeId = id;
  currentGrade = GRADES.find(g => g.id === id);
  applyGradeTheme(currentGrade);
  document.querySelectorAll('.grade-card').forEach(c => c.classList.remove('selected'));
  initGradeGrid();
}

function selectGradeAndGo(id) {
  if (GRADES.find(g => g.id === id).locked) return;
  selectGrade(id);
  goToHub();
}

function goToHub() {
  renderHub();
  showScreen('hub');
}

// ============================================================
// HUB
// ============================================================
function renderHub() {
  const grade = currentGrade;
  document.getElementById('hub-header-title').textContent = grade.name;
  document.getElementById('hub-icon').textContent = grade.icon;
  document.getElementById('hub-title').innerHTML = `${grade.icon} ${grade.name}<span>を学ぶ</span>`;
  document.getElementById('hub-sub').textContent = grade.sub;

  const read = readMap[grade.id] || [];
  const quiz = quizMap[grade.id] || {};
  const dots = document.getElementById('hub-dots');
  dots.innerHTML = grade.episodes.map((ep, i) => {
    const isRead = read.includes(i);
    const hasQuiz = quiz[i] !== undefined;
    const cls = hasQuiz ? 'quiz-done' : isRead ? 'read' : '';
    return `<div class="hub-dot ${cls}" onclick="readEp(${i})" title="${ep.keyword}">${i+1}</div>`;
  }).join('');

  document.getElementById('hub-prog-label').textContent = `📖 ${read.length}/${grade.episodes.length}単元学習済み`;

  const examBtn = document.getElementById('exam-mode-btn');
  if (grade.exam) { examBtn.style.display = ''; }
  else { examBtn.style.display = 'none'; }
}

// ============================================================
// EPISODE LIST
// ============================================================
function showEpList() {
  const grade = currentGrade;
  const read = readMap[grade.id] || [];
  const quiz = quizMap[grade.id] || {};
  const body = document.getElementById('ep-list-body');
  body.innerHTML = grade.episodes.map((ep, i) => {
    const isRead = read.includes(i);
    const score = quiz[i];
    const badge = score !== undefined ? '✅' : isRead ? '📖' : '';
    return `<div class="ep-card ${isRead?'read':''}" onclick="readEp(${i})">
      <div class="ep-num">単元${String(ep.id).padStart(2,'0')}</div>
      <div class="ep-info">
        <div class="ep-card-title">${ep.title}</div>
        <div class="ep-card-sub">${ep.subtitle}${score!==undefined?' ／ クイズ '+score+'/3点':''}</div>
      </div>
      <div class="ep-badge">${badge}</div>
    </div>`;
  }).join('');
  showScreen('list');
}

// ============================================================
// READER
// ============================================================
function readEp(idx) {
  currentEpIdx = idx;
  const ep = currentGrade.episodes[idx];
  document.getElementById('reader-title').textContent = `🧮 単元${ep.id} ${ep.keyword}`;
  document.getElementById('manga-content').innerHTML = buildLessonHtml(ep);
  if (!readMap[currentGradeId]) readMap[currentGradeId] = [];
  if (!readMap[currentGradeId].includes(idx)) {
    readMap[currentGradeId].push(idx);
    localStorage.setItem('mathReadMap', JSON.stringify(readMap));
  }
  showScreen('reader');
  document.getElementById('screen-reader').scrollTop = 0;
}

    <div class="m-panel"><div class="panel-inner m-panel-inner">

        </div>
        <div class="m-bubble-wrap right">
          <div class="m-char-col"><div class="m-char-icon b">${c2.icon}</div><div class="m-char-name">${c2.name}</div></div>

      <div class="m-vocab-label">📒 重要な数学用語</div>

  <div class="m-footer" onclick="startQuizForCurrentEp()" style="cursor:pointer">

// ============================================================
// QUIZ
// ============================================================
function startQuizForCurrentEp() { startQuiz(currentGradeId, currentEpIdx); }
function startRandomQuiz() { startQuiz(currentGradeId, Math.floor(Math.random()*currentGrade.episodes.length)); }

function startQuiz(gradeId, epIdx) {
  lastQuizGradeId = gradeId;
  lastQuizEpIdx = epIdx;
  const grade = GRADES.find(g=>g.id===gradeId);
  const ep = grade.episodes[epIdx];
  currentQuiz = [...ep.quiz];
  currentQuizIdx = 0;
  quizScore = 0;
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id => { document.getElementById(id).style.display=''; });
  document.getElementById('quiz-result').className = 'quiz-result';
  document.getElementById('quiz-ep-label').textContent = `🧪 ${grade.name} 単元${ep.id} 「${ep.keyword}」`;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = currentQuiz[currentQuizIdx];
  document.getElementById('quiz-prog-bar').innerHTML =
    currentQuiz.map((_,i)=>`<div class="quiz-pd ${i<currentQuizIdx?'done':i===currentQuizIdx?'current':''}"></div>`).join('');
  document.getElementById('quiz-question').textContent = q.q;

  if (q.type === 'short') {
    document.getElementById('quiz-options').innerHTML = `
      <textarea id="short-answer-input" class="short-answer-input" placeholder="自分の言葉で説明してみよう（記述問題）" rows="3"></textarea>
      <button class="quiz-option" style="text-align:center;font-weight:900" onclick="answerShort()">✏️ 解答を確認する</button>`;
  } else {
    document.getElementById('quiz-options').innerHTML =
      q.opts.map((o,i)=>`<button class="quiz-option" onclick="answer(${i})">${o}</button>`).join('');
  }
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn';
}

function answerShort() {
  const q = currentQuiz[currentQuizIdx];
  const input = document.getElementById('short-answer-input');
  input.disabled = true;
  document.querySelector('#quiz-options .quiz-option').disabled = true;
  const fb = document.getElementById('quiz-feedback');
  fb.className = 'quiz-feedback correct-fb show';
  fb.innerHTML = `📝 模範解答：<strong>${q.ans}</strong><br>${q.exp}<br><span style="font-size:12px;color:#6b7280">※記述問題は自己採点です。考え方が合っていればOK！</span>`;
  quizScore++; // 記述は自己採点なので満点扱いでカウント（自分で判断）
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

function answer(chosen) {
  const q = currentQuiz[currentQuizIdx];
  document.querySelectorAll('.quiz-option').forEach(o=>o.disabled=true);
  const fb = document.getElementById('quiz-feedback');
  if (chosen===q.ans) {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('correct');
    fb.className='quiz-feedback correct-fb show';
    fb.innerHTML=`⭕ 正解！<br>${q.exp}`;
    quizScore++;
  } else {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('wrong');
    document.querySelectorAll('.quiz-option')[q.ans].classList.add('correct');
    fb.className='quiz-feedback wrong-fb show';
    fb.innerHTML=`❌ 不正解。正解は「${q.opts[q.ans]}」<br>${q.exp}`;
  }
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

function nextQuestion() {
  currentQuizIdx++;
  if(currentQuizIdx>=currentQuiz.length) showResult();
  else renderQuestion();
}

function showResult() {
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id=>{ document.getElementById(id).style.display='none'; });
  const grade = GRADES.find(g=>g.id===lastQuizGradeId);
  const ep = grade.episodes[lastQuizEpIdx];
  if(!quizMap[lastQuizGradeId]) quizMap[lastQuizGradeId]={};
  quizMap[lastQuizGradeId][lastQuizEpIdx]=quizScore;
  localStorage.setItem('mathQuizMap',JSON.stringify(quizMap));
  const stamps=['😢','😅','😊','🎉'];
  const labels=['もう一度読んでみよう！','もう少し！','よくできました！','満点！パーフェクト！'];
  const si=quizScore===3?3:quizScore>=2?2:quizScore===1?1:0;
  document.getElementById('result-stamp').textContent=stamps[si];
  document.getElementById('result-score').textContent=`${quizScore}/3`;
  document.getElementById('result-label').textContent=labels[si];
  document.getElementById('result-sub').textContent=`${grade.name} 単元${ep.id}「${ep.keyword}」のクイズ結果`;
  document.getElementById('quiz-result').className='quiz-result show';
}

function retryQuiz() { startQuiz(lastQuizGradeId,lastQuizEpIdx); }

  const grade = currentGrade;

  lastQuizGradeId = currentGradeId;
  lastQuizEpIdx = epIdx;
  currentQuiz = [...examData];
  currentQuizIdx = 0;
  quizScore = 0;
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id => { document.getElementById(id).style.display=''; });
  document.getElementById('quiz-result').className = 'quiz-result';
  const ep = grade.episodes[epIdx];
  document.getElementById('quiz-ep-label').textContent = `📝 入試対策｜${grade.name} 単元${ep.id} 「${ep.keyword}」`;
  renderQuestion();
  showScreen('quiz');
}

  const grade = currentGrade;
  const body = document.getElementById('ep-list-body');
  body.innerHTML = grade.episodes.map((ep, i) => {
    const hasExam = grade.exam && grade.exam[i+1];
    return `<div class="ep-card ${hasExam?'':'locked'}" onclick="${hasExam?`startExamMode(${i})`:''}" style="${hasExam?'':'opacity:0.4;cursor:not-allowed'}">
      <div class="ep-num">単元${String(ep.id).padStart(2,'0')}</div>
      <div class="ep-info">
        <div class="ep-card-title">${ep.title}</div>
        <div class="ep-card-sub">${ep.keyword}${hasExam?' ／ 応用問題 '+grade.exam[i+1].length+'問':' ／ 準備中'}</div>
      </div>
      <div class="ep-badge">${hasExam?'📝':'🔒'}</div>
    </div>`;
  }).join('');
  showScreen('list');
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  initTrialSystem();
  if (!isContentAccessible() && name !== 'home') {
    showUnlockOverlay(PURCHASE_URL);
  }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='home') initGradeGrid();
  if(name==='hub') renderHub();
}

// ============================================================
// BOOT
// ============================================================
selectGrade('g1');
initGradeGrid();
</script>

});
</script>
